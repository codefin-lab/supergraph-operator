apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "supergraph-operator.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "supergraph-operator.controller.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: supergraph-operator
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        {{- include "supergraph-operator.controller.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "supergraph-operator.fullname" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: controller
          image: "{{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag }}"
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: APOLLO_CONFIG_HOME
              value: /rover-home
            - name: HOME
              value: /rover-home
          command: ["/usr/bin/tini", "--", "supergraph-operator"]
          args:
            - "--namespace={{ .Values.namespace }}"
            - "--federation-version={{ .Values.config.federationVersion }}"
            - "--router-deployment={{ .Values.config.routerDeployment }}"
            - "--supergraph-configmap={{ .Values.config.supergraphConfigMap }}"
            - "--composition-timeout={{ .Values.config.compositionTimeout }}"
            - "--history-count={{ .Values.config.historyCount }}"
            - "--health-probe-bind-address=:8081"
            - "--metrics-bind-address=:8080"
            {{- if .Values.config.leaderElect }}
            - "--leader-elect"
            {{- end }}
            {{- if .Values.config.dryRun }}
            - "--dry-run"
            {{- end }}
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: rover-home
              mountPath: /rover-home
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: rover-home
          emptyDir: {}
