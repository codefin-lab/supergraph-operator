apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "graph-controller.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "graph-controller.controller.labels" . | nindent 4 }}
rules:
  - apiGroups: ["vahalla.app"]
    resources: ["subgraphschemas"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["vahalla.app"]
    resources: ["subgraphschemas/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "graph-controller.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "graph-controller.controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "graph-controller.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "graph-controller.fullname" . }}
    namespace: {{ .Values.namespace }}
