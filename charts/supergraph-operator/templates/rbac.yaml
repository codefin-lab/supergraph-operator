apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "supergraph-operator.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "supergraph-operator.controller.labels" . | nindent 4 }}
rules:
  - apiGroups: ["codefin.io"]
    resources: ["subgraphschemas"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["codefin.io"]
    resources: ["subgraphschemas/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "supergraph-operator.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "supergraph-operator.controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "supergraph-operator.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "supergraph-operator.fullname" . }}
    namespace: {{ .Values.namespace }}
