# Supergraph Operator Configuration
controller:
  image:
    repository: ghcr.io/codefin/supergraph-operator
    tag: "latest"
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "250m"

# Controller flags
config:
  federationVersion: "=2.13.0"
  routerDeployment: "graph-router"
  supergraphConfigMap: "graph-supergraph"
  compositionTimeout: "2m"
  leaderElect: false
  dryRun: false
  historyCount: 0

# Prometheus metrics
metrics:
  serviceMonitor:
    enabled: false
    interval: "30s"

# Namespace
namespace: vahalla
